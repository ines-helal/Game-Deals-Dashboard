<!DOCTYPE html>
<html>
<head>
    <title>Game Deals</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<nav class="navbar navbar-dark bg-dark mb-4">
  <div class="container">
    <span class="navbar-brand"> Game Deals Dashboard</span>
  </div>
</nav>

<div class="container">

  <form method="GET" action="/" class="row g-2 mb-4">
      <div class="col-md-6">
          <input type="text" name="search" class="form-control" placeholder="Search games..." value="{{ query or '' }}">
      </div>

      <div class="col-md-3">
          <input type="number" name="min_price" class="form-control" placeholder="Min price">
      </div>

      <div class="col-md-3">
          <input type="number" name="max_price" class="form-control" placeholder="Max price">
      </div>

      <div class="col-12">
          <button type="submit" class="btn btn-success w-100">Filter Deals</button>
      </div>
  </form>

  <div class="row">
    {% for game in games %}
      <div class="col-md-4 mb-4">
        <div class="card game-card h-100">
          <img src="{{ game['thumb'] }}" class="card-img-top">

          <div class="card-body">
            <h5 class="card-title">{{ game['title'] }}</h5>
            <p class="price">${{ game['salePrice'] }}</p>
          </div>
        </div>
      </div>
    {% endfor %}
  </div>

</div>

</body>
</html>
